name: Fetch and Display Result

on:
  push:
    branches:
      - citest

jobs:
  fetch_and_display:
    name: Fetch and Display Result
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Fetch Result
        id: fetch
        run: |
          git fetch origin feature/base || true
          if [ -z "$(git show-ref refs/remotes/origin/feature/base)" ]; then
            echo "feature/base does not exist"
            git checkout -b feature/base
            git push origin feature/base
          fi
          

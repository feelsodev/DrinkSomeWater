name: Update Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      custom_version:
        description: 'Custom version (e.g., 2.3.0) - overrides bump_type if provided'
        required: false
        type: string

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version from xcconfig
        id: current
        run: |
          CURRENT_VERSION=$(grep '^MARKETING_VERSION' Tuist/Config/Base.xcconfig | sed 's/.*= *//')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          CUSTOM="${{ inputs.custom_version }}"
          BUMP_TYPE="${{ inputs.bump_type }}"
          
          if [ -n "$CUSTOM" ]; then
            NEW_VERSION="$CUSTOM"
            echo "Using custom version: $NEW_VERSION"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            
            case "$BUMP_TYPE" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "Bumping $BUMP_TYPE: $CURRENT -> $NEW_VERSION"
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create version update branch
        id: branch
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          BRANCH_NAME="version-update/v${NEW_VERSION}"
          
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Created branch: $BRANCH_NAME"

      - name: Update version in xcconfig
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          
          # Update MARKETING_VERSION in Base.xcconfig
          sed -i "s/^MARKETING_VERSION = .*/MARKETING_VERSION = $NEW_VERSION/" Tuist/Config/Base.xcconfig
          
          echo "Updated Base.xcconfig:"
          grep -E '^(MARKETING_VERSION|CURRENT_PROJECT_VERSION)' Tuist/Config/Base.xcconfig

      - name: Commit and push changes
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          BRANCH_NAME="${{ steps.branch.outputs.branch }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Tuist/Config/Base.xcconfig
          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin "$BRANCH_NAME"
          
          echo "Pushed branch: $BRANCH_NAME"

      - name: Create Pull Request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          CURRENT_VERSION="${{ steps.current.outputs.version }}"
          BRANCH_NAME="${{ steps.branch.outputs.branch }}"
          BUMP_TYPE="${{ inputs.custom_version && 'custom' || inputs.bump_type }}"
          
          PR_BODY="## Version Update
          
          | Item | Value |
          |------|-------|
          | Previous Version | ${CURRENT_VERSION} |
          | New Version | ${NEW_VERSION} |
          | Bump Type | ${BUMP_TYPE} |
          
          ---
          *This PR was automatically created by the Update Version workflow.*"
          
          PR_URL=$(gh pr create \
            --base master \
            --head "$BRANCH_NAME" \
            --title "chore: bump version to $NEW_VERSION" \
            --body "$PR_BODY")
          
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "Created PR: $PR_URL"

      - name: Summary
        run: |
          echo "## Version Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Previous Version | ${{ steps.current.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | ${{ steps.new.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump Type | ${{ inputs.custom_version && 'custom' || inputs.bump_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ steps.branch.outputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pull Request | ${{ steps.pr.outputs.pr_url }} |" >> $GITHUB_STEP_SUMMARY

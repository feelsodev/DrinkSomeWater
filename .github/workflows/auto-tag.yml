name: Auto Tag Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        type: choice
        options:
          - iOS
          - Android

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read iOS version
        if: ${{ github.event.inputs.platform == 'iOS' }}
        run: |
          VERSION=$(grep '^MARKETING_VERSION' ios/Tuist/Config/Base.xcconfig | sed 's/.*= *//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Read iOS version: $VERSION"

      - name: Read Android version
        if: ${{ github.event.inputs.platform == 'Android' }}
        run: |
          VERSION=$(grep 'versionName' android/app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Read Android version: $VERSION"

      - name: Create and push tag
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          NEW_TAG="${PLATFORM}/v${VERSION}"
          
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists!"
            exit 1
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: ${{ github.event.inputs.platform == 'iOS' && 'iOS' || 'Android' }} v${{ env.VERSION }}
          generate_release_notes: true
